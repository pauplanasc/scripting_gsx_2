apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 2 # ¡Empezamos con 2 clones del backend!
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: pauplanasc/simple-app-gsx:v1
        ports:
        - containerPort: 3000
        envFrom:
        - configMapRef:
            name: app-config
        # NIVEL INTERMEDIO: Límites de Recursos
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "250m"
        # NIVEL INTERMEDIO: Healthchecks
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 2
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: backend # Este nombre es vital, Nginx lo usará como DNS
spec:
  selector:
    app: backend
  ports:
  - port: 3000
    targetPort: 3000